<!DOCTYPE html>
<html lang="en" data-theme="light">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>UP Bikeshare | Student Portal</title>
    <!-- Bootstrap CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="/css/style.css?v=14">
    <script>
        // Inline Role Guard to prevent unauthorized access
        const token = sessionStorage.getItem('adminToken');
        const role = sessionStorage.getItem('userRole');
        if (!token || role !== 'student') {
            window.location.href = '/'; // Redirect back to Portal Login
        }
    </script>
</head>

<body class="d-flex flex-column align-items-center justify-content-center" style="min-height: 100vh; background-color: var(--bg-main);">
    <div class="text-center p-5 card shadow-sm" style="max-width: 500px; background-color: var(--bg-panel); border-radius: var(--radius-md); border: 1px solid var(--border);">
        <h3 class="fw-bold mb-3" style="color: var(--text-h);">Student Portal</h3>
        <p class="text-muted mb-4">This is a blank canvas. You can design the student dashboard view here.</p>
        <button id="btn-student-logout" class="btn btn-outline-danger fw-bold py-2 px-4" style="border-radius: var(--radius-sm);">
            Log Out
        </button>
    </div>

    <script>
        document.addEventListener('DOMContentLoaded', () => {
            const btnStudentLogout = document.getElementById('btn-student-logout');
            if (btnStudentLogout) {
                btnStudentLogout.addEventListener('click', () => {
                    sessionStorage.removeItem('adminToken');
                    sessionStorage.removeItem('userRole');
                    window.location.href = '/'; // Go back to login
                });
            }
        });
    </script>
</body>

</html>
